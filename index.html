<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиника "Здоровье" - Запись на прием</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏥 Клиника "Здоровье"</h1>
        
        <!-- Информация о пользователе -->
        <div id="userInfo" class="user-info" style="display: none;">
            <span>👤 <span id="userEmail"></span></span>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
        
        <!-- Навигация -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="booking">📝 Запись на прием</button>
            <button class="tab-btn" data-tab="doctors">👨‍⚕️ Наши врачи</button>
            <button class="tab-btn" data-tab="reviews">⭐ Отзывы</button>
        </div>

        <!-- Вкладка: Запись на прием -->
        <div id="booking" class="tab-content active">
            <div class="booking-form">
                <div class="form-group">
                    <label for="doctor">👨‍⚕️ Выберите врача:</label>
                    <select id="doctor">
                        <option value="">-- Выберите врача --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">📅 Выберите дату:</label>
                    <input type="date" id="date">
                </div>

                <div class="form-group">
                    <label for="time">⏰ Выберите время:</label>
                    <select id="time">
                        <option value="">-- Сначала выберите врача и дату --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">👤 Ваше имя:</label>
                    <input type="text" id="name" placeholder="Введите ваше имя">
                </div>

                <div class="form-group">
                    <label for="phone">📞 Телефон:</label>
                    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
                </div>

                <button id="submitBtn" class="submit-btn">✅ Записаться</button>
            </div>

            <div id="message" class="message"></div>

            <div class="appointments">
                <h2>📋 Мои записи</h2>
                <div id="appointmentsList" class="appointments-list">
                    <p class="empty-message">Загрузка...</p>
                </div>
            </div>
        </div>

        <!-- Вкладка: Наши врачи -->
        <div id="doctors" class="tab-content">
            <h2>👨‍⚕️ Наши специалисты</h2>
            <div id="doctorsList" class="doctors-grid">
                <p class="empty-message">Загрузка...</p>
            </div>
        </div>

        <!-- Вкладка: Отзывы -->
        <div id="reviews" class="tab-content">
            <h2>⭐ Отзывы пациентов</h2>
            
            <div class="add-review">
                <h3>📝 Оставить отзыв</h3>
                <div class="form-group">
                    <label>👨‍⚕️ Выберите врача:</label>
                    <select id="reviewDoctor">
                        <option value="">-- Выберите врача --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>👤 Ваше имя:</label>
                    <input type="text" id="reviewName" placeholder="Введите ваше имя">
                </div>
                <div class="form-group">
                    <label>⭐ Оценка:</label>
                    <div class="rating">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <s


pan class="star" data-rating="5">★</span>
                    </div>
                    <input type="hidden" id="reviewRating" value="5">
                </div>
                <div class="form-group">
                    <label>💬 Ваш отзыв:</label>
                    <textarea id="reviewComment" rows="4" placeholder="Расскажите о вашем опыте..."></textarea>
                </div>
                <button id="submitReview" class="submit-btn">📝 Оставить отзыв</button>
            </div>

            <h3>📖 Отзывы пациентов</h3>
            <div id="reviewsList" class="reviews-list">
                <p class="empty-message">⭐ Пока нет отзывов</p>
            </div>
        </div>
    </div>

<!-- Модальное окно авторизации по коду -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>🔐 Авторизация</h2>
        
        <!-- Шаг 1: Ввод email -->
        <div id="stepEmail">
            <p>Введите email для входа</p>
            <div class="form-group">
                <label>📧 Email:</label>
                <input type="email" id="authEmail" placeholder="your@email.com">
            </div>
            <button id="sendCodeBtn" class="submit-btn">📧 Отправить код</button>
        </div>
        
        <!-- Шаг 2: Ввод кода (скрыт по умолчанию) -->
        <div id="stepCode" style="display: none;">
            <p>Введите код из письма</p>
            <div class="form-group">
                <label>🔑 Код подтверждения:</label>
                <input type="text" id="authCode" placeholder="123456">
            </div>
            <button id="verifyCodeBtn" class="submit-btn">✅ Подтвердить</button>
            <button id="backToEmailBtn" class="submit-btn" style="background: #6c757d; margin-top: 10px;">← Назад</button>
        </div>
        
        <p id="authMessage" style="margin-top: 10px; color: red;"></p>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
